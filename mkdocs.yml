site_name: Issen
site_url: https://securityronin.github.io/issen/
repo_url: https://github.com/SecurityRonin/issen
repo_name: SecurityRonin/issen
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/issen-icon-128.png
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture-diagram.html
  - Quickstart: szechuan-sauce-quickstart.md
  - Design & Internals:
      - System Architecture: ARCHITECTURE.md
      - Issen vs Plaso: issen-vs-plaso-architecture.md
      - Selective Decompression (Triage): selective-decompression-triage.md
      - Writing Disk-Image Crates: writing-disk-image-crates.md
      - "DRY — Shared Crates": dry-analysis-shared-crates.md
      - CLI Front-Door Spec: cli-unified-frontdoor-spec.md
      - Remote Sources: remote-sources.md
  - Reference:
      - Validation: validation.md
      - Correlation Validation: validation-correlate.md
      - Format Coverage Audit: format-coverage-audit.md
      - Test Corpus Catalog: corpus-catalog.md
      - Fleet Atlas: fleet-atlas.md
      - Fleet Capability Inventory: fleet-capability-inventory.md
      - Forensicnomicon Convergence Plan: fleet-fn-convergence-plan.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

plugins:
  - search

# Raw HTML files in docs/ (e.g. architecture-diagram.html) are copied
# to site/ as-is by MkDocs and can be linked directly from markdown.
# use_directory_urls must be false so relative links like
# architecture-diagram.html resolve correctly.
use_directory_urls: false

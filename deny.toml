# cargo-deny configuration for Issen
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

# ---------------------------------------------------------------------------
# Advisories — check against the RustSec advisory database
# ---------------------------------------------------------------------------
[advisories]
# Only flag unmaintained crates that are DIRECT workspace dependencies; purely
# transitive unmaintained crates (async-std, fxhash, kuchiki, number_prefix,
# proc-macro-error, rustls-pemfile — reached via opendal/printpdf/indicatif)
# cannot be upgraded independently and are tracked via this policy rather than
# per-ID.
unmaintained = "workspace"
ignore = [
    # All transitive via yara-x / evtx / mft — we cannot upgrade independently.
    { id = "RUSTSEC-2026-0021", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0020", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2025-0141", reason = "bincode via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2025-0118", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2025-0046", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2024-0436", reason = "paste via wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2023-0071", reason = "rsa via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2021-0153", reason = "encoding via evtx/mft; awaiting upstream update" },
    # wasmtime 26.x advisory batch (transitive via yara-x) — awaiting yara-x bump.
    { id = "RUSTSEC-2026-0085", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0086", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0087", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0088", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0089", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0091", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0092", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0093", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0094", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0095", reason = "wasmtime via yara-x; awaiting yara-x update" },
    { id = "RUSTSEC-2026-0096", reason = "wasmtime via yara-x; awaiting yara-x update" },
    # rustls-webpki 0.101.7 pinned by the old rustls 0.21 stack (tonic 0.10 ->
    # tikv-client -> opendal -> issen-remote-io); cannot bump without an opendal/
    # tonic update. Affects only the remote-IO TLS path.
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.101 via tonic/tikv-client/opendal; awaiting opendal update" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.101 via tonic/tikv-client/opendal; awaiting opendal update" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101 via tonic/tikv-client/opendal; awaiting opendal update" },
]

# ---------------------------------------------------------------------------
# Licenses — only allow known permissive licenses
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    # Permissive BSD-style license of the libbzip2 codec, pulled transitively by
    # sevenz-rust2 for the (rare) bzip2-in-7z compression method. Batteries-
    # Included: allow the gate rather than amputate sevenz's bzip2 capability.
    "bzip2-1.0.6",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — prevent duplicate or unwanted crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# ---------------------------------------------------------------------------
# Sources — only allow crates.io
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

project:
  name: "RapidTriage"
  description: "Integrated forensic triage platform that bridges the forensic-to-legal translation gap with attorney-ready output"
  version: "0.1.0"
  target_users: "IR practitioners, forensic examiners, and litigation support teams"
  core_problem: "Forensic analysis is ~20% of engagement cost; ~80% is manual report writing, evidence reprocessing, and attorney back-and-forth because every forensic tool produces engineer-oriented output"
  differentiator: "Attorney-ready output — interactive HTML reports for exploration and polished Word/PDF expert witness reports for the record"
  success_metric: "Community adoption first (GitHub stars, downloads, contributors), then paying customers"
  tech_stack: "Rust — existing codebase: usnjrnl-forensic v0.6, tl v0.1, ewf v0.1, shrinkpath v0.1"

  licensing:
    open_source: "Apache 2.0 (parsers) / MIT (utilities) — permissive to maximize community adoption"
    proprietary: "Closed source — integration layer, pipeline, report engine, UI, enterprise features"

  anti_goals:
    - "Not a collection tool (ingests KAPE/Velociraptor/ACQUIRE output)"
    - "Not an eDiscovery platform (produces evidence for Relativity/Nuix)"
    - "Not a SIEM (post-incident analysis, not real-time detection)"

  constraints:
    - "Solo founder, bootstrapped"
    - "Consulting revenue funds development"
    - "Must maximize solo velocity while enabling community contributions"

# Phase 1: Brand Guidelines
strategy:
  beliefs:
    - "Evidence tells a story — every feature filtered through: does this help the examiner tell the story?"
    - "The last 80% is the real problem — treat the report as the product, not an afterthought"
    - "By practitioners, for practitioners — tool reflects real workflow"
    - "Open parsers, integrated platform — parsers commoditize, integration differentiates"
    - "Correctness over speed (but aim for both) — never sacrifice correctness for performance"
  kill_list:
    - "Not a collection tool — collection is solved"
    - "Not an eDiscovery platform — different problem, different users"
    - "Not a SIEM/SOC tool — post-incident, not real-time"
    - "Not enterprise-first — solo examiner first, enterprise later"
    - "Not a competitor to the examiner — eliminates translation work"

  # Phase 2: North Star
  north_star_metric:
    name: "Time-to-Attorney-Ready Report (TARR)"
    definition: "Elapsed time from evidence ingestion to completed attorney-ready deliverable"
    target: "< 4 hours (50%+ reduction from ~16 hour baseline)"
    input_metrics:
      - "Parse-to-Timeline Latency: < 10 minutes"
      - "Findings-to-Narrative Time: < 2 hours"
      - "Report Acceptance Rate: > 80% (attorney accepts without calling examiner back)"
  measurement:
    leading: "TARR predicts engagement profitability and examiner capacity"
    actionable: "Every pipeline stage contributes measurably"
    customer_centric: "Measures value delivered to examiner, not features shipped"
  personas:
    primary:
      name: "Sarah Chen — Solo IR Practitioner"
      context: "Runs own DFIR consultancy, juggles 3-5 cases, needs evidence-to-deliverable fast"
    secondary:
      name: "Marcus Webb — Firm Forensic Examiner"
      context: "Works cases assigned by partners, needs reports partners can review and attorneys can use"
    tertiary:
      name: "Diana Reyes — Litigation Support Analyst"
      context: "Bridges technical forensics and legal proceedings, needs evidence formatted for court filings"
    future:
      name: "James Okafor — CISO/IR Manager"
      context: "Oversees IR team, needs visibility, standardized methodology, team collaboration (Phase 3+)"


# Action Roadmap - Structured Outputs
# Generated: 2026-03-20
# Source: north-star-advisor/docs/ACTION_ROADMAP.md

roadmap:
  recommended_path: "B"
  recommended_path_name: "Report Engine First"
  north_star: "TARR < 4 hours (from ~16hr baseline)"
  start_date: "2026-03-21"
  total_duration: "90 days"

  phases:
    - id: "phase_1"
      name: "Foundation Sprint"
      theme: "Wire the Pipeline End-to-End"
      days: "1-30"
      start_date: "2026-03-21"
      end_date: "2026-04-19"
      owner: "Solo founder"
      focus_areas:
        - name: "rt-core + rt-pipeline foundation"
          allocation: "40%"
          deliverables:
            - "TimelineEvent schema (DuckDB table + Rust struct)"
            - "Layer 0-4 pipeline skeleton (sequential)"
            - "rt-parser-usnjrnl (ForensicParser trait port)"
            - "KAPE-to-timeline wire-up"
          definition_of_done: "rt-cli ingest ./kape-output produces populated DuckDB timeline"
        - name: "rt-timeline query engine"
          allocation: "20%"
          deliverables:
            - "Time-range queries against DuckDB"
            - "Source-type filtering"
            - "SQLite export (portable case file)"
            - "Event count summary"
          definition_of_done: "rt-cli timeline --from --to returns filtered events; SQLite export produces valid database"
        - name: "rt-report MVP (HTML only)"
          allocation: "30%"
          deliverables:
            - "Askama HTML template (self-contained single-file)"
            - "Timeline visualization (interactive, embedded JS)"
            - "Filterable event table"
            - "Evidence summary with SHA-256 hashes"
            - "Findings placeholder section"
          definition_of_done: "rt-cli report --format html produces attorney-browseable HTML file"
      buffer: "10%"
      success_criteria:
        - metric: "Pipeline completeness"
          target: "USN events flowing from KAPE to HTML report"
        - metric: "TARR (USN-only)"
          target: "< 30 minutes with manual findings"
        - metric: "External dependencies"
          target: "Zero (no cloud, no AI, no network)"
        - metric: "Code quality"
          target: "All tests pass, CI green"
        - metric: "Parser accuracy"
          target: "100% timestamp accuracy vs EZ Tools"

    - id: "phase_2"
      name: "Parser Breadth + DOCX Reports"
      theme: "Three Parsers, Two Formats"
      days: "31-60"
      start_date: "2026-04-20"
      end_date: "2026-05-19"
      owner: "Solo founder"
      focus_areas:
        - name: "MFT and EventLog parsers"
          allocation: "35%"
          deliverables:
            - "rt-parser-mft (Master File Table)"
            - "rt-parser-evtx (Windows Event Logs)"
            - "Parallel ingestion via rayon"
            - "Unified 3-parser timeline"
          definition_of_done: "3 parsers produce unified, correctly-ordered timeline from real KAPE collection"
        - name: "DOCX report generation"
          allocation: "35%"
          deliverables:
            - "Word document output via docx-rs"
            - "Multilevel heading numbering (w:abstractNum system)"
            - "Examiner findings section"
            - "Chain-of-custody page with SHA-256 hashes"
            - "Exhibit numbering with cross-references"
            - "Executive summary page"
          definition_of_done: "rt-cli report --format docx produces Word document attorney confirms usable"
        - name: "Open-source first parsers"
          allocation: "20%"
          deliverables:
            - "Publish rt-parser-usnjrnl on crates.io"
            - "Publish rt-parser-mft on crates.io"
            - "Publish rt-parser-evtx on crates.io"
            - "GitHub repo (github.com/h4x0r/rapidtriage)"
            - "Apache 2.0 license, CI/CD, documentation"
          definition_of_done: "Three parser crates published on crates.io with passing CI"
      buffer: "10%"
      milestones:
        - "3-parser unified timeline from real KAPE collection"
        - "Dual-format output (HTML + DOCX)"
        - "Public GitHub repo with Apache 2.0 parsers"
        - "TARR < 2 hours for 3-parser case"

    - id: "phase_3"
      name: "Intelligence + Community"
      theme: "AI-Assisted Findings, Community First Impression"
      days: "61-90"
      start_date: "2026-05-20"
      end_date: "2026-06-18"
      owner: "Solo founder"
      focus_areas:
        - name: "rt-intel MVP"
          allocation: "35%"
          deliverables:
            - "Ollama integration for narrative generation"
            - "Grounded generation (template+fill, cite event_ids)"
            - "AI-free mode (--no-ai flag)"
            - "Findings auto-detection (heuristic)"
          definition_of_done: "rt-cli report --format docx --ai produces attorney-readable AI narrative; --no-ai works independently"
        - name: "Plugin SDK + community preparation"
          allocation: "25%"
          deliverables:
            - "rt-plugin-sdk crate (ForensicParser trait, test harness)"
            - "Example plugin: rt-parser-prefetch"
            - "Contribution guide (CONTRIBUTING.md)"
            - "API documentation on docs.rs"
          definition_of_done: "External developer can implement parser using only published SDK and docs"
        - name: "Community launch"
          allocation: "25%"
          deliverables:
            - "DFIR community announcement"
            - "GitHub Discussions enabled"
            - "README with quick start and screenshots"
            - "Synthetic demo KAPE collection"
          definition_of_done: "Public announcement made; at least one external user has tried the tool"
      buffer: "15%"
      phase_gate:
        proceed: "TARR < 4 hours + 10+ GitHub stars + 1+ community PR/issue"
        iterate: "TARR 4-8 hours OR no community engagement"
        pivot: "TARR > 8 hours OR zero external interest after 30 days marketing"

  avoid_list:
    - item: "TUI/GUI"
      rationale: "CLI-only validates pipeline without frontend complexity"
      when_relevant: "After TARR < 4hr validated"
    - item: "AI/LLM features"
      rationale: "Report engine first; AI without report engine has nowhere to render"
      when_relevant: "90-day phase"
    - item: "Multiple parser types (30-day)"
      rationale: "USN-only for pipeline validation; avoid debugging parser + pipeline simultaneously"
      when_relevant: "60-day phase"
    - item: "Enterprise features"
      rationale: "Solo practitioner first; enterprise is Phase 3+"
      when_relevant: "After first paying user"
    - item: "WASM plugin system"
      rationale: "Compile-time traits only for MVP"
      when_relevant: "90-day phase"
    - item: "Performance optimization"
      rationale: "Correctness first; aligns with axiom"
      when_relevant: "After 3-parser accuracy validated"
    - item: "Website/marketing"
      rationale: "Product first; marketing unfinished product wastes first impression"
      when_relevant: "After attorney-reviewed output"
    - item: "DOCX/PDF (30-day)"
      rationale: "HTML-only first; Word adds format complexity"
      when_relevant: "60-day phase"
    - item: "Parallelism/rayon (30-day)"
      rationale: "Sequential processing; correctness over throughput"
      when_relevant: "60-day phase"
    - item: "Database schema versioning"
      rationale: "Accept breaking changes during MVP; zero users to migrate"
      when_relevant: "After alpha release"

  risks:
    - id: "R1"
      name: "Solo founder bandwidth collapse"
      probability: "Medium"
      impact: "Critical"
      mitigation: "Consulting revenue provides runway; scope ruthlessly to 30-day increments"
      trigger: "Consulting > 30 hrs/wk for 3+ consecutive weeks"
    - id: "R2"
      name: "DuckDB Rust bindings immaturity"
      probability: "Medium"
      impact: "High"
      mitigation: "SQLite fallback path exists via tl crate"
      trigger: "DuckDB causes data corruption or > 5 blocking bugs in 30-day sprint"
    - id: "R3"
      name: "DOCX generation complexity"
      probability: "Medium"
      impact: "Medium"
      mitigation: "python-docx subprocess fallback; start with simple templates"
      trigger: "docx-rs cannot produce correct multilevel numbering after 1 week"
    - id: "R4"
      name: "Zero community uptake"
      probability: "Medium"
      impact: "Medium"
      mitigation: "Conference talks, DFIR Slack, practitioner network; consulting clients guaranteed first users"
      trigger: "< 10 GitHub stars and zero external issues after 30 days public"
    - id: "R5"
      name: "Magnet announces AI reporting"
      probability: "Low-Medium"
      impact: "High"
      mitigation: "Accelerate; ship faster with less polish; open-source + offline advantages persist"
      trigger: "Magnet product announcement or user reviews mention report improvements"
    - id: "R6"
      name: "3-parser coverage too narrow"
      probability: "Medium"
      impact: "Medium"
      mitigation: "USN+MFT+EVTX cover 60-70% IR triage; accelerate Registry/Prefetch if needed"
      trigger: "> 40% of real engagements require artifacts outside 3-parser set"
    - id: "R7"
      name: "Local LLM narrative quality insufficient"
      probability: "Medium"
      impact: "Low"
      mitigation: "Fall back to template-based reports; adjust TARR target to < 6 hours"
      trigger: "> 50% of AI narrative sections require manual rewriting"
    - id: "R8"
      name: "TimelineEvent schema churn"
      probability: "Low"
      impact: "Medium"
      mitigation: "Accept breaking changes during MVP; stabilize before community launch"
      trigger: "Schema changes > 3 times during 60-day phase"

  resource_allocation:
    dev_hours_per_week: 20
    consulting_constraint: "If consulting > 30 hrs/wk for 3+ weeks, timelines extend"
    infrastructure_cost: "$0 for MVP (no cloud, local Ollama, GitHub free tier)"

  review_schedule:
    weekly: "Every Friday - progress, blockers, TARR measurement, scope creep check"
    checkpoint_30: "2026-04-19 - Formal review against 30-day success criteria"
    checkpoint_60: "2026-05-19 - Formal review against 60-day milestones"
    phase_gate_90: "2026-06-18 - Proceed/iterate/pivot decision"
    strategic_triggers:
      - "TARR > 8 hours after 8 weeks"
      - "Competitor announces attorney-ready reports"
      - "AI narrative fails after 4 weeks prompt engineering"
      - "Zero paying users after 6 months"
      - "Consulting > 30 hrs/wk for 3+ weeks"

  strategic_milestones:
    - id: "M1"
      name: "First attorney-ready report"
      target_date: "End of Q2 2026"
      success: "Complete report from evidence-to-deliverable, used on real engagement"
      kill: "Attorney rejects report; requires full manual rework"
    - id: "M2"
      name: "TARR < 4 hours validated"
      target_date: "End of Q3 2026"
      success: "3 real engagements with TARR < 4 hours"
      kill: "Average TARR > 6 hours across 3 engagements"
    - id: "M3"
      name: "First paying user (non-consulting)"
      target_date: "End of Q4 2026"
      success: "Revenue from practitioner who is not founder's consulting client"
      kill: "Zero external revenue by end of Q4 2026"
    - id: "M4"
      name: "Community parser contribution"
      target_date: "End of Q1 2027"
      success: "1+ community-contributed parser merged"
      kill: "Zero contributions after 6 months open-source"

  tarr_traceability:
    baseline: "~16 hours"
    after_30_day: "~12 hours"
    after_60_day: "~8 hours"
    after_90_day: "~4 hours"
    reductions:
      - area: "rt-pipeline + USN parser"
        phase: "30-day"
        reduction: "-0.5 hr"
      - area: "rt-timeline query engine"
        phase: "30-day"
        reduction: "-0.5 hr"
      - area: "rt-report HTML"
        phase: "30-day"
        reduction: "-3 hr"
      - area: "MFT + EVTX parsers"
        phase: "60-day"
        reduction: "-1 hr"
      - area: "DOCX report generation"
        phase: "60-day"
        reduction: "-2 hr"
      - area: "Exhibit numbering + citations"
        phase: "60-day"
        reduction: "-1 hr"
      - area: "AI narrative generation"
        phase: "90-day"
        reduction: "-2.5 hr"
      - area: "Cross-artifact correlation"
        phase: "90-day (stretch)"
        reduction: "-1.5 hr"

  cross_references:
    - document: "BRAND_GUIDELINES.md"
      fields: ["product_name", "beliefs", "kill_list", "positioning"]
    - document: "NORTHSTAR.md"
      fields: ["tarr_metric", "input_metrics", "personas", "phase_boundaries", "validation_gates"]
    - document: "COMPETITIVE_LANDSCAPE.md"
      fields: ["competitors", "market_window", "positioning_shorthand"]
    - document: "ARCHITECTURE_BLUEPRINT.md"
      fields: ["hexagonal_architecture", "crate_topology", "pipeline_layers", "report_engine"]
    - document: "STRATEGIC_RECOMMENDATION.md"
      fields: ["path_b_rationale", "focus_areas", "avoid_list", "milestones", "confidence"]
    - document: "SECURITY_ARCHITECTURE.md"
      fields: ["trust_boundaries", "malicious_evidence", "ai_hallucination", "daubert_compliance"]

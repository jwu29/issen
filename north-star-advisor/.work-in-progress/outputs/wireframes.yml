# Wireframes - Structured Outputs
# Generated: 2026-03-20
# Source: north-star-advisor/docs/design/WIREFRAMES.md

wireframes:
  core_screens:
    - id: "cli-ingest"
      name: "CLI: Evidence Ingest (rt ingest)"
      surface: "CLI"
      purpose: "Ingest evidence sources, verify hashes, launch parallel parsing"
      emotional_state: "Cautious, hopeful"
      priority: "P0"
      section: "4.1"
      key_components:
        - "Hash verification display"
        - "Multi-parser progress bars"
        - "Artifact prefix color coding"
        - "Next steps suggestions"
      accessibility:
        - "--no-color flag (NO_COLOR env)"
        - "--plain ASCII-only mode"
        - "--json structured output"
        - "--verbose linear text for screen readers"

    - id: "tui-dashboard"
      name: "TUI: Main Dashboard"
      surface: "TUI (ratatui)"
      purpose: "Three-pane interactive analysis workspace for timeline review"
      emotional_state: "Focused, analytical"
      priority: "P0"
      section: "4.2"
      key_components:
        - "Evidence tree sidebar"
        - "Timeline table (virtualized 50K+ rows)"
        - "Density heatmap (1-row)"
        - "Findings sidebar"
        - "Command/filter bar"
        - "Status bar with keyboard shortcuts"
        - "Integrity badge"
        - "TARR timer"
      accessibility:
        - "Vim-style keyboard navigation (j/k/h/l/g/G)"
        - "Tab to cycle panes"
        - "Color independence via [XX] text prefixes"
        - "Character-based density encoding (.:|#)"

    - id: "tui-density-heatmap"
      name: "TUI: Timeline Density Heatmap (Detail)"
      surface: "TUI (ratatui)"
      purpose: "Expanded heatmap for temporal anomaly detection"
      emotional_state: "Curious, pattern-seeking"
      priority: "P1"
      section: "4.3"
      key_components:
        - "All-sources density row"
        - "Per-source-type breakdown rows"
        - "Anomaly annotation with counts"
        - "Character density legend"
        - "Time range zoom (h/l)"

    - id: "tui-findings"
      name: "TUI: Findings Panel (Detail)"
      surface: "TUI (ratatui)"
      purpose: "Manage bookmarked findings with notes and linked events"
      emotional_state: "Confident, building the case"
      priority: "P0"
      section: "4.4"
      key_components:
        - "Findings summary table"
        - "Linked events list"
        - "Examiner notes (free-text)"
        - "Severity classification"
        - "Report inclusion toggle"

    - id: "html-report-cover"
      name: "HTML Report: Cover Page and Executive Summary"
      surface: "HTML Report"
      purpose: "Attorney-facing deliverable cover with chain of custody verification"
      emotional_state: "Anticipation, excited (examiner); trust-building (attorney)"
      priority: "P1"
      section: "4.5"
      key_components:
        - "Report title and case metadata"
        - "Chain of custody verification badge"
        - "Skip links (6 targets)"
        - "Executive summary narrative"
        - "Key findings summary with severity"
        - "Cross-references to finding detail sections"

    - id: "html-report-timeline"
      name: "HTML Report: Interactive Timeline"
      surface: "HTML Report"
      purpose: "Collapsible filterable timeline for attorney review"
      emotional_state: "Review and verification"
      priority: "P1"
      section: "4.6"
      key_components:
        - "Filter bar (source, severity, time, search)"
        - "Density minimap"
        - "Collapsible event clusters"
        - "Finding cross-references"
        - "Pagination (client-side)"
        - "JavaScript-disabled fallback"

    - id: "html-report-findings"
      name: "HTML Report: Findings with Exhibits"
      surface: "HTML Report"
      purpose: "Detailed findings with examiner narrative and hyperlinked exhibits"
      emotional_state: "High stakes"
      priority: "P1"
      section: "4.7"
      key_components:
        - "Finding cards with severity border"
        - "Examiner narrative"
        - "Exhibit table with hyperlinks"
        - "Cross-finding references"
        - "Impact statement"

    - id: "gui-desktop"
      name: "Future: Tauri Desktop GUI"
      surface: "Desktop GUI (Tauri v2)"
      purpose: "Full desktop app with multi-pane layout and report live preview"
      emotional_state: "Efficient, power-user"
      priority: "P2"
      section: "4.8"
      key_components:
        - "Menu bar (native OS)"
        - "Resizable evidence tree"
        - "Full data table with column resize"
        - "Canvas/SVG heatmap"
        - "Event detail + hex viewer"
        - "Report live preview pane"

  color_extensions:
    - token: "--color-density-cold"
      light: "#DBEAFE"
      dark: "#1E3A5F"
      usage: "Heatmap low density"
    - token: "--color-density-warm"
      light: "#FDE68A"
      dark: "#92400E"
      usage: "Heatmap moderate density"
    - token: "--color-density-hot"
      light: "#FCA5A5"
      dark: "#991B1B"
      usage: "Heatmap high density / anomaly"
    - token: "--color-density-peak"
      light: "#EF4444"
      dark: "#F87171"
      usage: "Heatmap peak anomaly"
    - token: "--color-bookmark"
      light: "#F59E0B"
      dark: "#FBBF24"
      usage: "Bookmarked finding indicator"
    - token: "--color-hash-verified"
      light: "#059669"
      dark: "#34D399"
      usage: "Hash verification passed"
    - token: "--color-hash-mismatch"
      light: "#DC2626"
      dark: "#F87171"
      usage: "Hash verification failed"
    - token: "--color-cli-heading"
      dark: "#F59E0B"
      usage: "CLI section headings"
    - token: "--color-cli-progress"
      dark: "#475569"
      usage: "CLI progress bar fill"
    - token: "--color-report-cover-bg"
      light: "#F8FAFC"
      usage: "HTML report cover background"

  brand_identity:
    signature_element: "Evidence Integrity Badge"
    description: "Chain-of-custody verification displayed on every surface"
    surfaces:
      cli: "[VERIFIED] SHA-256: hash (green text)"
      tui: "Shield icon + Integrity status + hash + source count"
      html: "Full verification card with hash, status, timestamp, tool version"
    secondary_element: "Artifact Source Indicator"
    description_2: "12-color dot + icon + text prefix system for artifact type identification"
    color_independence: "Three channels: color, icon, text prefix"

  component_specs:
    buttons:
      - type: "Primary"
        height: "48px"
        style: "--color-accent bg, white text"
        usage: "Generate Report, Apply Filter"
      - type: "Secondary"
        height: "48px"
        style: "Transparent, --color-accent border"
        usage: "Export, Clear, Cancel"
      - type: "Ghost"
        height: "44px"
        style: "Transparent, --color-text-secondary"
        usage: "View Details, navigation"
      - type: "Danger"
        height: "48px"
        style: "--color-severity-critical bg, white text"
        usage: "Delete Finding, Remove Evidence"
    cards:
      - type: "Finding"
        border: "4px left, severity color"
        icon: "[!]/[^]/[-]/[.]"
        usage: "Finding display by severity"
      - type: "Evidence source"
        border: "4px left, artifact source color"
        icon: "Source type icon"
        usage: "Evidence tree items"
      - type: "Integrity badge"
        border: "4px left, --color-hash-verified"
        icon: "Shield"
        usage: "Chain of custody"
      - type: "Error notice"
        border: "4px left, --color-severity-high"
        icon: "[!]"
        usage: "Non-blocking errors"
    forensic_elements:
      - element: "Timestamp"
        font: "--font-mono, tabular-nums"
        usage: "All timeline entries (UTC)"
      - element: "File path"
        font: "--font-mono, truncate"
        usage: "Artifact paths"
      - element: "Hash value"
        font: "--font-mono, --text-xs, truncate middle"
        usage: "SHA-256/MD5 display"
      - element: "Artifact prefix"
        font: "--font-mono, [XX] format"
        usage: "Source type ID across all surfaces"
      - element: "Exhibit reference"
        font: "--font-mono, --color-primary, underlined"
        usage: "E-001a, F-001 cross-refs"

  accessibility_checklist:
    cli:
      - "--no-color flag (honors NO_COLOR)"
      - "--plain ASCII-only mode"
      - "--json structured output"
      - "--verbose screen reader mode"
      - "Error messages on stderr with [ERROR]/[WARN] prefix"
    tui:
      - "Vim-style navigation (j/k/h/l/g/G)"
      - "Tab pane cycling"
      - "Color independence (text prefixes + character variation)"
      - "? keybinding reference overlay"
      - "Focus indicator (> prefix + inverse)"
    html_report:
      - "Skip links (6 targets)"
      - "Semantic HTML (h1-h3, table, nav, article)"
      - "ARIA landmarks and labels"
      - "JavaScript-disabled fallback"
      - "Print stylesheet"
      - "WCAG 2.1 AA all text pairs"
    gui:
      - "Full WCAG 2.1 AA"
      - "Standard OS keyboard shortcuts"
      - "Screen reader ARIA support"
      - "High contrast / forced-colors"

  brand_validation:
    per_screen_checks:
      - "Speaks examiner's language (no dumbing down)"
      - "Collaborative error language"
      - "Specific counts and timestamps"
      - "No automated interpretations"
      - "Actionable next steps"
      - "Practitioner-first tone"
    banned_elements:
      - "Collection features"
      - "eDiscovery workflows"
      - "SIEM/SOC real-time alerting"
      - "Enterprise admin UI"
      - "AI-generated conclusions"
      - "Marketing language in reports"
      - "Risk scores / threat levels"
      - "Subscription nag screens"
      - "Tutorial wizards / guided tours"
      - "Social / sharing / collaboration features"

  implementation_priority:
    p0_mvp:
      - "CLI: Evidence Ingest (4.1)"
      - "CLI: Timeline Output"
      - "TUI: Main Dashboard (4.2)"
      - "TUI: Findings Panel (4.4)"
    p1_core:
      - "HTML Report: Cover + Executive Summary (4.5)"
      - "HTML Report: Interactive Timeline (4.6)"
      - "HTML Report: Findings with Exhibits (4.7)"
      - "TUI: Density Heatmap (4.3)"
    p2_polish:
      - "Desktop GUI (4.8)"
      - "Report Live Preview in TUI"
      - "Multi-case management view"

  stats:
    total_screens: 8
    total_component_specs: 56
    color_extensions: 10
    banned_elements: 10
    accessibility_items_per_screen: "4-6"

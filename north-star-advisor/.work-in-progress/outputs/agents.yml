# Agent Prompts - Structured Outputs
# Generated: 2026-03-20
# Source: north-star-advisor/docs/architecture/AGENT_PROMPTS.md

agents:
    - id: "pipeline-agent"
      crate: "rt-pipeline"
      license: "Apache 2.0"
      repo: "public"
      purpose: "Build and maintain the multi-layer evidence ingestion system that transforms raw forensic evidence into a unified VirtualFilesystem and orchestrates parallel parsing into timeline events"
      tarr_phase: "Ingest + Parse"
      tarr_budget: "10 minutes"
      key_traits:
          - "StorageProvider"
          - "ImageFormat"
          - "VolumeSystem"
          - "FilesystemAccessor"
      key_concepts:
          - "VirtualFilesystem (multi-source fusion)"
          - "Layer 0-4 pipeline architecture"
          - "Streaming I/O with bounded buffers"
          - "rayon parallel parser orchestration"
          - "Incremental ingestion via SourceFingerprint"
      constraints:
          - "Streaming only — never load entire evidence into memory"
          - "Graceful degradation on corrupted evidence"
          - "No rt-core modification without RFC"
          - "All types must be Send + Sync"
          - "Deterministic output for identical inputs"
      testing:
          - "NIST CFTT forensic image datasets"
          - "Corrupted/truncated evidence handling"
          - "Multi-source VFS with overlapping paths"
          - "Incremental re-ingestion"
          - "50GB E01 Layer 0-3 < 2 minutes benchmark"

    - id: "timeline-agent"
      crate: "rt-timeline"
      license: "Apache 2.0"
      repo: "public"
      purpose: "Build and maintain the DuckDB-backed columnar timeline store that indexes, queries, and exports forensic timelines at nanosecond precision"
      tarr_phase: "Parse + Timeline Review"
      tarr_budget: "Sub-second queries during 90-minute review"
      key_traits:
          - "TimelineQuery (rt-core port)"
      key_concepts:
          - "DuckDB TIMESTAMP_NS nanosecond precision"
          - "Zone maps for time-range queries"
          - "Incremental append via SourceFingerprint"
          - "SQLite portable export"
          - "Schema migrations for version upgrades"
      constraints:
          - "DuckDB is primary store — SQLite only for export"
          - "Nanosecond precision mandatory"
          - "Incremental only — never reprocess"
          - "Schema migrations required for changes"
          - "No filesystem I/O for queries"
      testing:
          - "Synthetic timelines at 1K/100K/1M/10M/100M events"
          - "Multi-format timestamp roundtrip (NTFS, Unix, FAT, HFS+)"
          - "Concurrent reads during ingestion"
          - "SQLite export format compatibility"
          - "10M events, 1-hour time-range query < 200ms benchmark"

    - id: "parser-agent"
      crate: "rt-parser-*"
      license: "Apache 2.0"
      repo: "public"
      purpose: "Build and maintain individual forensic artifact parsers implementing the ForensicParser trait that transform raw artifacts into structured TimelineEvents"
      tarr_phase: "Parse"
      tarr_budget: "8 minutes (all parsers combined for 50GB case)"
      key_traits:
          - "ForensicParser"
          - "EventEmitter"
      key_concepts:
          - "One parser per crate (rt-parser-{artifact})"
          - "Tier 1 compile-time plugins via inventory crate"
          - "Streaming event emission via EventEmitter"
          - "NIST CFTT validation"
          - "Cross-tool validation against plaso/AXIOM/X-Ways"
      constraints:
          - "One parser per crate for independent versioning"
          - "Streaming output — never collect then return"
          - "No panics — Result types for all fallible ops"
          - "Deterministic output"
          - "Artifact-specific dependencies only"
      testing:
          - "Real-world artifacts from multiple Windows versions"
          - "Artifacts from multiple collection tools (KAPE, Velociraptor, FTK Imager)"
          - "Corrupted artifact handling (truncated, zero-filled, wrong magic)"
          - "Timestamp accuracy via manual hex validation"
          - "cargo-fuzz with random/mutated inputs"
          - "Cross-tool output comparison"

    - id: "report-agent"
      crate: "rt-report"
      license: "Proprietary"
      repo: "private"
      purpose: "Build and maintain the dual-format report engine that transforms forensic findings into attorney-ready deliverables (interactive HTML + polished Word/PDF)"
      tarr_phase: "Report Generation + Deliver"
      tarr_budget: "30 minutes generation + 5 minutes delivery"
      key_traits:
          - "ReportGenerator (rt-core port)"
      key_concepts:
          - "Askama template engine"
          - "Self-contained HTML (no CDN, no external deps)"
          - "DOCX via docx-rs with proper multilevel numbering"
          - "PDF via headless Chromium"
          - "Expert witness report structure (8 sections)"
          - "Bates numbering for exhibits"
          - "Chain-of-custody metadata"
          - "FRE 901/902 authentication language"
      constraints:
          - "HTML must be fully self-contained (single file)"
          - "DOCX uses Word multilevel list numbering (no literal section numbers in headings)"
          - "No legal conclusions — findings and methodology only"
          - "Template-driven formatting only"
          - "Reproducible output for same inputs"
      testing:
          - "Reports with 5/50/500 findings for scale"
          - "DOCX compatibility (Word 2019+, LibreOffice 7+, Google Docs)"
          - "HTML cross-browser including offline/air-gapped"
          - "PDF pagination and Bates numbering"
          - "Unicode content (CJK, RTL, emoji)"
          - "50-finding report < 30 seconds benchmark"
      report_sections:
          - "Engagement Summary"
          - "Qualifications"
          - "Evidence Description"
          - "Tools and Methodology"
          - "Findings"
          - "Timeline Narrative"
          - "Conclusions"
          - "Appendices"

    - id: "intelligence-agent"
      crate: "rt-intel"
      license: "Proprietary"
      repo: "private"
      purpose: "Build and maintain the intelligence layer providing AI-assisted analysis, detection rules (YARA-X, Sigma), RAG retrieval, and threat intelligence enrichment"
      tarr_phase: "Timeline Review + Findings-to-Narrative"
      tarr_budget: "Findings-to-Narrative < 2 hours (saves 2+ hours of manual writing)"
      key_traits: []
      key_concepts:
          - "ForensicLLM via Ollama (local-first)"
          - "Multi-model routing (80% small 7B-13B, 20% large 70B+)"
          - "Grounded generation (every claim cites evidence)"
          - "YARA-X for file-based detection"
          - "Sigma rules for event-based detection"
          - "Modular RAG with three stores (case-specific, cross-case, reference)"
          - "lancedb embedded vector store"
          - "nomic-embed-text embeddings"
          - "AI-free mode mandatory"
      constraints:
          - "Grounded generation only — every claim cites event IDs"
          - "AI-free mode behind feature flag"
          - "Local-first default (Ollama)"
          - "Examiner authority — AI output is always 'draft' or 'suggestion'"
          - "Ungrounded claims marked [UNGROUNDED] and excluded from reports"
      testing:
          - "Grounding verification (cited event IDs must exist)"
          - "YARA-X with EICAR and curated malware samples"
          - "Sigma rules against known attack pattern EVTX"
          - "RAG retrieval precision@5 > 80%"
          - "AI-free mode compilation and workflow"
          - "Narrative draft < 60 seconds for 25-finding case"

    - id: "frontend-agent"
      crates:
          - "rt-cli"
          - "rt-tui"
          - "rt-gui"
          - "rt-web"
      licenses:
          rt-cli: "Apache 2.0"
          rt-tui: "Proprietary"
          rt-gui: "Proprietary"
          rt-web: "Proprietary"
      repos:
          rt-cli: "public"
          rt-tui: "private"
          rt-gui: "private"
          rt-web: "private"
      purpose: "Build and maintain the four frontend surfaces (CLI, TUI, GUI, Web) as thin adapters over rt-core, providing the right interface for each examiner workflow"
      tarr_phase: "All phases (zero-overhead adapters)"
      tarr_budget: "0 overhead — frontends must not add latency"
      key_concepts:
          - "Hexagonal architecture — frontends are adapters only"
          - "CLI is the reference implementation (clap v4)"
          - "TUI for interactive exploration (ratatui 0.29)"
          - "GUI for visual analysis (Tauri v2)"
          - "Web for team collaboration (axum 0.8 + Leptos 0.7)"
          - "Identical analytical results across all frontends"
          - "Keyboard-first for CLI and TUI (vim-style)"
          - "Offline-capable — no CDN dependencies"
      constraints:
          - "No analysis logic in frontends — adapters only"
          - "CLI is baseline — every feature works in CLI first"
          - "Keyboard-first for CLI and TUI"
          - "Offline-capable (air-gapped forensic labs)"
          - "rt-cli must not import proprietary crates"
          - "No Electron — Tauri only"
      testing:
          - "CLI integration tests for all subcommands"
          - "TUI snapshot tests (insta + ratatui harness)"
          - "GUI E2E tests (Tauri + Playwright)"
          - "Web API integration tests + Leptos component tests"
          - "Cross-frontend analytical output identity verification"

cross_agent:
    data_flow:
        - from: "Pipeline Agent"
          to: "Timeline Agent"
          interface: "EventEmitter trait"
          data: "TimelineEvent[]"
        - from: "Timeline Agent"
          to: "Report Agent"
          interface: "TimelineQuery port"
          data: "TimelineSlice, FindingsSet"
        - from: "Timeline Agent"
          to: "Intelligence Agent"
          interface: "TimelineQuery port"
          data: "TimelineSlice for context"
        - from: "Intelligence Agent"
          to: "Report Agent"
          interface: "NarrativeDraft type"
          data: "Grounded narrative with citations"
        - from: "All agents"
          to: "Frontend Agent"
          interface: "rt-core ports"
          data: "All analytical results"

    quality_gate:
        - "cargo clippy — zero warnings"
        - "cargo test — all pass"
        - "cargo fmt — formatted"
        - "cargo doc — no warnings"
        - "cargo audit — no vulnerabilities"
        - "cargo deny — license compliance"
        - "Open-core check — no proprietary imports in public crates"

    shared_principles:
        - "Correctness over speed"
        - "Evidence integrity (read-only)"
        - "Daubert-defensible methodology"
        - "rt-core purity (zero side effects)"
        - "Open-core boundary enforcement"
        - "Streaming over buffering"
        - "Deterministic output"

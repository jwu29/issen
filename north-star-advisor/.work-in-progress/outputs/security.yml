# Security Architecture - Structured Outputs
# Generated: 2026-03-20
# Source: north-star-advisor/docs/SECURITY_ARCHITECTURE.md

threat_model:
  attack_surfaces:
    - id: "AS01"
      name: "Evidence Files"
      vector: "Crafted forensic artifacts (malformed MFT, poisoned USN, booby-trapped E01)"
      target: "rt-pipeline parsers"
      severity: "critical"
    - id: "AS02"
      name: "WASM Plugins"
      vector: "Sandbox escape attempts from community-contributed parsers"
      target: "Wasmtime runtime"
      severity: "high"
    - id: "AS03"
      name: "LLM Prompt Injection"
      vector: "Injected prompts via evidence metadata (filenames, registry values, log entries)"
      target: "rt-intel ForensicLLM"
      severity: "high"
    - id: "AS04"
      name: "Supply Chain"
      vector: "Compromised Rust crate dependencies, Ollama models, YARA/Sigma rules"
      target: "Build pipeline, runtime"
      severity: "high"
    - id: "AS05"
      name: "Sensitive Material"
      vector: "CSAM, attorney-client privileged material, PII in evidence"
      target: "Examiner legal liability"
      severity: "critical"

  owasp_agentic_mapping:
    - id: "ASI01"
      risk: "Agent Goal Hijack"
      exposure: "medium"
      severity: "high"
      priority: "P1"
      mitigation: "Structured prompts with data/instruction separation, output grounding checks"
    - id: "ASI02"
      risk: "Tool Misuse"
      exposure: "high"
      severity: "critical"
      priority: "P0"
      mitigation: "rt-intel has read-only timeline access, cannot write reports directly, examiner approval required"
    - id: "ASI03"
      risk: "Identity Abuse"
      exposure: "low"
      severity: "medium"
      priority: "P2"
      mitigation: "Compile-time crate boundary enforcement via Rust type system"
    - id: "ASI04"
      risk: "Supply Chain"
      exposure: "high"
      severity: "high"
      priority: "P0"
      mitigation: "cargo-audit, cargo-deny, cargo-vet, minimal deps, pinned versions, signed releases"
    - id: "ASI05"
      risk: "Code Execution"
      exposure: "high"
      severity: "critical"
      priority: "P0"
      mitigation: "WASM zero-authority sandbox, #![forbid(unsafe_code)] in parsers, cargo-fuzz"
    - id: "ASI06"
      risk: "Memory Poisoning"
      exposure: "medium"
      severity: "high"
      priority: "P1"
      mitigation: "lancedb embeddings isolated per case, input validation on vector store writes"
    - id: "ASI07"
      risk: "Inter-Agent Communication"
      exposure: "low"
      severity: "low"
      priority: "P2"
      mitigation: "Typed Rust interfaces (compile-time), no network protocols between crates"
    - id: "ASI08"
      risk: "Cascading Failures"
      exposure: "medium"
      severity: "high"
      priority: "P1"
      mitigation: "Circuit breakers, parser panic isolation, graceful degradation"
    - id: "ASI09"
      risk: "Human-Agent Trust"
      exposure: "high"
      severity: "critical"
      priority: "P0"
      mitigation: "Grounded generation, AI confidence scores, visual distinction, AI-free mode"
    - id: "ASI10"
      risk: "Rogue Agents"
      exposure: "low"
      severity: "low"
      priority: "P2"
      mitigation: "No autonomous agents; rt-intel only operates on explicit user commands"

  threat_scenarios:
    - name: "Malicious Evidence Parser Exploit"
      owasp_id: "ASI05"
      severity: "critical"
      mitigation: "Rust memory safety, cargo-fuzz, resource limits, process isolation"
    - name: "AI Hallucination in Expert Witness Report"
      owasp_id: "ASI09"
      severity: "critical"
      mitigation: "Grounded generation, source verification UI, AI-free mode, watermarking"
    - name: "CSAM Legal Liability"
      owasp_id: "domain-specific"
      severity: "critical"
      mitigation: "PhotoDNA/NCMEC hash matching, in-memory only, no disk writes, reporting workflow"
    - name: "Supply Chain Attack via Compromised Crate"
      owasp_id: "ASI04"
      severity: "critical"
      mitigation: "cargo-audit/deny/vet, pinned deps, reproducible builds, signed releases"
    - name: "Prompt Injection via Evidence Metadata"
      owasp_id: "ASI01"
      severity: "high"
      mitigation: "Structured prompts, data/instruction separation, output grounding checks"
    - name: "Attorney-Client Privilege Violation"
      owasp_id: "domain-specific"
      severity: "critical"
      mitigation: "Privilege review workflow, keyword screening, quarantine from AI and reports"

trust_boundaries:
  - id: "TB0"
    name: "Untrusted Zone"
    contents: ["evidence files", "WASM plugins", "Ollama models", "YARA/Sigma rules"]
    enforcement: "Read-only access, format validation, resource limits"
  - id: "TB1"
    name: "Semi-Trusted Zone"
    contents: ["rt-pipeline", "input validation", "format detection", "hash computation"]
    enforcement: "Typed TimelineEvent[] output only, no raw bytes propagation"
  - id: "TB2"
    name: "Trusted Zone"
    contents: ["rt-core", "rt-timeline", "rt-correlation", "rt-report", "rt-intel"]
    enforcement: "Compile-time Rust type system, crate visibility rules"
  - id: "TB3"
    name: "Privileged Zone"
    contents: ["audit logs", "license keys", "case metadata", "hash verification db"]
    enforcement: "Append-only audit, integrity chaining, encrypted at rest"

auth_patterns:
  solo_mode:
    description: "No authentication required; OS-level user is the examiner"
    version_range: "v0.1 - v0.3"
    identity_source: "~/.config/rapidtriage/examiner.toml"
  enterprise_mode:
    description: "SSO via SAML/OIDC with RBAC"
    version_range: "v0.4+"
    crate: "rt-enterprise"
    offline_support: "Cached IdP public keys for air-gapped validation"
  crate_auth:
    description: "Compile-time trust via Rust sealed traits and crate visibility"
    enforcement: "Always active, zero runtime cost"

rbac_roles:
  - role: "examiner"
    permissions: "Full case access, evidence ingestion, report generation, AI features"
  - role: "reviewer"
    permissions: "Read-only case access, annotation, approval/rejection"
  - role: "supervisor"
    permissions: "All examiner + case assignment, examiner management, audit review"
  - role: "legal"
    permissions: "Read-only finalized reports, interactive HTML, privilege review"
  - role: "admin"
    permissions: "License management, SSO config, system audit logs, no case data access"

audit_requirements:
  chain_of_custody: true
  integrity_chaining: "SHA-256 hash chain (each event includes prev_hash)"
  retention: "7 years minimum for evidence-related events"
  export_format: "Standalone chain-of-custody document for court filing"
  event_categories:
    - "case_lifecycle"
    - "evidence_access"
    - "parse_activity"
    - "timeline_operations"
    - "ai_activity"
    - "report_generation"
    - "privilege_review"
    - "csam_detection"
    - "authentication"
    - "system_events"

kill_switches:
  - id: "ai_disable"
    scope: "AI processing"
    description: "Halt all AI processing; all other features continue"
  - id: "plugin_disable"
    scope: "Specific WASM plugin"
    description: "Disable a specific community plugin by ID"
  - id: "pipeline_halt"
    scope: "Evidence processing"
    description: "Halt evidence ingestion; timeline and reports still accessible"
  - id: "case_lock"
    scope: "Specific case"
    description: "No modifications, exports, or new analysis on a case"
  - id: "emergency_shutdown"
    scope: "Global"
    description: "Halt all operations, flush audit logs, exit"

forensic_specific_controls:
  evidence_integrity:
    read_only: "O_RDONLY at OS level"
    hash_algorithm: "SHA-256"
    hash_points: ["evidence ingest", "report generation"]
    mismatch_action: "Block report generation, alert examiner"
  parser_safety:
    unsafe_code: "Forbidden (#![forbid(unsafe_code)] in parser crates)"
    fuzzing: "cargo-fuzz, 10M+ iterations per parser"
    resource_limits:
      max_field_size: "4KB"
      max_parse_depth: 256
      timeout_per_artifact: "60s"
  csam_handling:
    detection: "PhotoDNA/NCMEC perceptual hash matching"
    storage: "In-memory only, no disk writes of flagged content"
    reporting: "NCMEC CyberTipline workflow integration"
    legal_basis: "18 U.S.C. Section 2258A, Adam Walsh Act"
  privilege_review:
    detection: "Keyword/domain pattern matching (configurable attorney lists)"
    action: "Quarantine from AI analysis and report generation"
    workflow: "Flag -> quarantine -> examiner review -> release/confirm"
  ai_safety:
    grounding: "Every AI finding must cite a specific TimelineEvent ID"
    verification: "Automated grounding check before display"
    transparency: "AI confidence scores, visual distinction, watermarking"
    fallback: "AI-free mode (all features work without Ollama)"
  supply_chain:
    tools: ["cargo-audit", "cargo-deny", "cargo-vet"]
    policy: "Pinned deps, minimal deps in parsers, reproducible builds, signed releases"
  offline_operation:
    requirement: "All security features work without network access"
    rationale: "Air-gapped forensic lab deployment"

defense_layers:
  - "Evidence Integrity (read-only, hash verification, chain of custody)"
  - "Memory Safety (Rust compiler, #![forbid(unsafe_code)], cargo-fuzz)"
  - "Sandbox Isolation (WASM zero authority, memory/time limits)"
  - "AI Safety (grounded generation, confidence scores, AI-free mode)"
  - "Sensitive Material Handling (CSAM detection, privilege review, PII redaction)"
  - "Supply Chain (cargo-audit/deny/vet, minimal deps, signed releases)"
  - "Monitoring & Audit (integrity-chained logs, kill switches, circuit breakers)"
  - "Authentication & Authorization (SSO, RBAC, compile-time capabilities)"

key_principles:
  - "Evidence Sanctity: never modify evidence, verify hashes at ingest and report time"
  - "Compiler as Security Tool: Rust type system enforces trust boundaries at compile time"
  - "Zero Ambient Authority: WASM plugins have no capabilities by default"
  - "Grounded AI: every AI finding must cite a verifiable TimelineEvent"
  - "Offline-First Security: all features work without network access"
  - "Fail Secure: errors block output, never silently proceed"
  - "Audit Everything: integrity-chained logs exportable for court"
  - "Defense in Depth: eight layers, no single point of failure"

name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger to test-build all targets (incl. the heavy Windows MSI)
  # without publishing — the release job below only runs on tag pushes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Do not cancel sibling targets if one fails: the Windows MSI must be
      # able to ship even if a macOS/Linux target has a transient issue.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      # sccache -> Cloudflare R2 (S3-compatible, off the GitHub cache quota).
      # Layers UNDER rust-cache: when rust-cache hits, sccache is idle; on a
      # Cargo.lock-change miss it still serves the cached DuckDB objects (the
      # lock-change safety net rust-cache's whole-lock key can't provide).
      SCCACHE_BUCKET: issen-sccache
      SCCACHE_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      SCCACHE_REGION: auto
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # rust-toolchain.toml pins 1.96.0, which overrides whatever the action
      # installs; the cross-target must be added to THAT pinned toolchain (not
      # the action's default `stable`), or cargo builds with 1.96.0 minus the
      # target -> E0463 "can't find crate for core".
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      # Cache ~/.cargo + target/ per matrix target so the ~800-crate / bundled-
      # DuckDB compile is only paid in full once. cache-on-failure keeps the
      # warm compile even when a later step (MSI packaging) fails.
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Route the bundled-DuckDB C++ compile (the 84-min MSVC cost) through
      # sccache so a Cargo.lock-change rebuild reuses the cached objects. cc-rs
      # honours CC/CXX; sccache wraps cl.exe per translation unit. Windows-only
      # first — don't risk the already-fast macOS/Linux C++ builds until the
      # MSVC wrapping is proven (check `sccache --show-stats`).
      - name: Wrap C/C++ with sccache (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CC=sccache cl.exe" >> "$GITHUB_ENV"
          echo "CXX=sccache cl.exe" >> "$GITHUB_ENV"

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      # etcd-client's build script invokes protoc to compile its .proto files;
      # it is not preinstalled on the runners, so every target needs it.
      - name: Install protoc
        shell: bash
        run: |
          case "${{ runner.os }}" in
            macOS)   brew install protobuf ;;
            Linux)   sudo apt-get update && sudo apt-get install -y protobuf-compiler ;;
            Windows) choco install protoc ;;
          esac

      - name: Build issen
        run: cargo build --release -p issen-cli --target ${{ matrix.target }}

      # Cache hit-rate (verify DuckDB C++ is actually caching on a lock-change
      # rebuild; on a warm rust-cache hit cargo skips the compile, so C requests
      # read ~0 — that's expected, not a failure).
      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz issen
          cd ../../..

      # Standalone .exe (zipped) in addition to the MSI installer, so users can
      # grab the bare executable without running the installer.
      - name: Package exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/issen.exe -DestinationPath issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --version 0.3.9 --locked

      # Virtual workspace: cargo-wix needs --package plus the repo-root wxs
      # (whose Source= paths are repo-root-relative); --no-build reuses the
      # binary from the Build step above.
      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build --package issen-cli --include wix/main.wxs --target ${{ matrix.target }} --output issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi

      # always(): upload whatever artifacts exist (the .exe zip, the tar, the MSI)
      # even if a later step in this job failed — so a good binary still ships.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: issen-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.*
          if-no-files-found: ignore

  release:
    needs: build
    # Tag pushes only (a workflow_dispatch test run must not publish). Runs
    # even if a build target failed, so a successful MSI (and any other
    # successful target) still ships; uploads whatever artifacts were produced.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: 'issen-*-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            artifacts/issen-*
            artifacts/checksums.txt
          generate_release_notes: true

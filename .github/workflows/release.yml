name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger to test-build the priority targets (incl. the heavy Windows
  # MSI) without publishing — the release job below only runs on tag pushes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Do not cancel sibling targets if one fails: the Windows installer must
      # ship even if the macOS target has a transient issue, and vice-versa.
      fail-fast: false
      matrix:
        include:
          # Priority targets: Apple-silicon .dmg + Windows .exe/.msi. (Intel mac
          # and Linux are a follow-up — DuckDB's C++ build needs a g++ cross
          # toolchain on musl that this minimal matrix deliberately skips.)
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # rust-toolchain.toml pins 1.96.0, which overrides whatever the action
      # installs; the cross-target must be added to THAT pinned toolchain (not
      # the action's default `stable`), or cargo builds with 1.96.0 minus the
      # target -> E0463 "can't find crate for core". (Mirrors sqlite-forensic.)
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      # Cache ~/.cargo + target/ per matrix target so the bundled-DuckDB compile
      # is only paid in full once. cache-on-failure keeps the warm compile even
      # when a later step (MSI packaging) fails.
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          cache-on-failure: true

      # etcd-client's build script invokes protoc to compile its .proto files;
      # it is not preinstalled on the runners, so every target needs it.
      - name: Install protoc
        shell: bash
        run: |
          case "${{ runner.os }}" in
            macOS)   brew install protobuf ;;
            Windows) choco install protoc ;;
          esac

      - name: Build issen
        run: cargo build --release -p issen-cli --target ${{ matrix.target }}

      # macOS: ship both a tar.gz (for CLI users) and a .dmg (the expected
      # double-click download). The .dmg is a compressed UDZO image holding the
      # bare `issen` binary; it is unsigned, so first launch needs a
      # right-click -> Open past Gatekeeper.
      - name: Package (macOS) tar.gz + dmg
        if: runner.os == 'macOS'
        run: |
          V=${{ steps.version.outputs.version }}
          T=${{ matrix.target }}
          cd target/$T/release
          tar czf "$GITHUB_WORKSPACE/issen-$V-$T.tar.gz" issen
          cd "$GITHUB_WORKSPACE"
          mkdir -p dmgroot
          cp target/$T/release/issen dmgroot/
          hdiutil create -volname "issen $V" -srcfolder dmgroot -ov -format UDZO "issen-$V-$T.dmg"

      # Standalone .exe (zipped) in addition to the MSI installer, so users can
      # grab the bare executable without running the installer.
      - name: Package exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/issen.exe -DestinationPath issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --version 0.3.9 --locked

      # Virtual workspace: cargo-wix needs --package plus the repo-root wxs
      # (whose Source= paths are repo-root-relative); --no-build reuses the
      # binary from the Build step above.
      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build --package issen-cli --include wix/main.wxs --target ${{ matrix.target }} --output issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi

      # always(): upload whatever artifacts exist (the .exe zip, the tar/dmg, the
      # MSI) even if a later step in this job failed — so a good binary ships.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: issen-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.*
          if-no-files-found: ignore

  release:
    needs: build
    # Tag pushes only (a workflow_dispatch test run must not publish). Runs even
    # if a build target failed, so a successful target still ships; uploads
    # whatever artifacts were produced.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: 'issen-*-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            artifacts/issen-*
            artifacts/checksums.txt
          generate_release_notes: true

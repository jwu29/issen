name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger to test-build all targets (incl. the heavy Windows MSI)
  # without publishing — the release job below only runs on tag pushes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Do not cancel sibling targets if one fails: the Windows MSI must be
      # able to ship even if a macOS/Linux target has a transient issue.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # issen has no rust-toolchain.toml, so the action's toolchain is used
      # directly (no override) and the cross-target lands on it correctly.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build issen
        run: cargo build --release -p issen-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz issen
          cd ../../..

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --version 0.3.9 --locked

      # Virtual workspace: cargo-wix needs --package plus the repo-root wxs
      # (whose Source= paths are repo-root-relative); --no-build reuses the
      # binary from the Build step above.
      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build --package issen-cli --target ${{ matrix.target }} --output issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi wix/main.wxs

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: issen-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: issen-${{ steps.version.outputs.version }}-${{ matrix.target }}.*

  release:
    needs: build
    # Tag pushes only (a workflow_dispatch test run must not publish). Runs
    # even if a build target failed, so a successful MSI (and any other
    # successful target) still ships; uploads whatever artifacts were produced.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: 'issen-*-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            artifacts/issen-*
            artifacts/checksums.txt
          generate_release_notes: true

name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy cargo doc
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2

      - name: Build workspace docs
        run: |
          cargo doc \
            --workspace \
            --no-deps \
            --document-private-items \
            --features remote
        env:
          RUSTDOCFLAGS: "--enable-index-page -Zunstable-options --default-theme ayu"

      - name: Add redirect index and copy markdown docs
        run: |
          # Root redirect → issen_cli crate docs
          cat > target/doc/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Issen — Docs</title>
            <meta http-equiv="refresh" content="0; url=issen_cli/index.html">
          </head>
          <body>
            <p>Redirecting to <a href="issen_cli/index.html">issen_cli</a>&hellip;</p>
          </body>
          </html>
          EOF
          # Copy markdown docs so they're accessible under /docs/
          mkdir -p target/doc/docs
          cp -r docs/*.md target/doc/docs/ 2>/dev/null || true
          cp README.md target/doc/docs/README.md 2>/dev/null || true
          # Copy standalone HTML pages to site root
          cp docs/architecture-diagram.html target/doc/architecture-diagram.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

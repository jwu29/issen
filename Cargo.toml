[workspace]
resolver = "2"
members = [
    "crates/rt-core",
    "crates/rt-pipeline",
    "crates/rt-plugin-sdk",
    "crates/rt-timeline",
    "crates/rt-ewf",
    "crates/rt-shrinkpath",
    "crates/rt-signatures",
    "crates/rt-remote-access",
    "crates/parsers/rt-parser-usnjrnl",
    "crates/parsers/rt-parser-mft",
    "crates/parsers/rt-parser-evtx",
    "crates/rt-report",
    "crates/rt-cli",
    "xtask",
]

[workspace.package]
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
repository = "https://github.com/h4x0r/rapidtriage"
authors = ["RapidTriage Contributors"]

[workspace.dependencies]
# Internal crates (path dependencies)
rt-core       = { path = "crates/rt-core" }
rt-pipeline   = { path = "crates/rt-pipeline" }
rt-plugin-sdk = { path = "crates/rt-plugin-sdk" }
rt-timeline   = { path = "crates/rt-timeline" }
rt-ewf        = { path = "crates/rt-ewf" }
rt-shrinkpath = { path = "crates/rt-shrinkpath" }
rt-parser-usnjrnl = { path = "crates/parsers/rt-parser-usnjrnl" }
rt-parser-mft     = { path = "crates/parsers/rt-parser-mft" }
rt-parser-evtx    = { path = "crates/parsers/rt-parser-evtx" }
rt-report         = { path = "crates/rt-report" }
rt-signatures = { path = "crates/rt-signatures" }
rt-remote-access = { path = "crates/rt-remote-access" }

# External dependencies
duckdb       = { version = "1", features = ["bundled"] }
rusqlite     = { version = "0.32", features = ["bundled"] }
rayon        = "1"
clap         = { version = "4", features = ["derive"] }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
thiserror    = "2"
anyhow       = "1"
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
inventory    = "0.3"
chrono       = { version = "0.4", features = ["serde"] }
bytes        = "1"
memmap2      = "0.9"
tempfile     = "3"
sha2         = "0.10"
hex          = "0.4"

# Signature scanning engines
yara-x      = "0.12"
tau-engine   = "1"

# HTTP client for feed downloads
reqwest      = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }

# Additional parsing & networking
serde_yaml   = "0.9"
csv          = "1"
ipnet        = "2"
md-5         = "0.10"
regex        = "1"

# Forensic artifact parsers
usnjrnl-forensic = { version = "0.6", default-features = false }
ewf          = "0.1"
evtx         = { version = "0.11", default-features = false }
mft          = "0.6"
notatin      = "1.0"

# XML / filesystem scanning
uuid         = { version = "1", features = ["v4"] }
glob         = "0.3"
quick-xml    = "0.37"

# Dev/test dependencies
insta        = { version = "1", features = ["yaml"] }
assert_cmd   = "2"
predicates   = "3"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"

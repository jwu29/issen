# cargo-audit configuration for Issen
# https://github.com/rustsec/rustsec/tree/main/cargo-audit
#
# These ignores MIRROR deny.toml's `[advisories] ignore` list. Both gates query
# the same RustSec database; cargo-audit scans Cargo.lock directly (it does not
# read deny.toml), so the vulnerability ignores are repeated here. Keep the two
# lists in sync — every entry below is a transitive dependency Issen cannot
# upgrade independently (wasmtime/rsa via yara-x; rustls-webpki via the old
# rustls 0.21 TLS stack pulled by tonic -> tikv-client -> opendal).
[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa Marvin attack; via yara-x
    "RUSTSEC-2025-0046", # wasmtime; via yara-x
    "RUSTSEC-2025-0118", # wasmtime; via yara-x
    "RUSTSEC-2026-0020", # wasmtime; via yara-x
    "RUSTSEC-2026-0021", # wasmtime; via yara-x
    "RUSTSEC-2026-0085", # wasmtime; via yara-x
    "RUSTSEC-2026-0086", # wasmtime; via yara-x
    "RUSTSEC-2026-0087", # wasmtime; via yara-x
    "RUSTSEC-2026-0088", # wasmtime; via yara-x
    "RUSTSEC-2026-0089", # wasmtime; via yara-x
    "RUSTSEC-2026-0091", # wasmtime; via yara-x
    "RUSTSEC-2026-0092", # wasmtime; via yara-x
    "RUSTSEC-2026-0093", # wasmtime; via yara-x
    "RUSTSEC-2026-0094", # wasmtime; via yara-x
    "RUSTSEC-2026-0095", # wasmtime; via yara-x
    "RUSTSEC-2026-0096", # wasmtime; via yara-x
    "RUSTSEC-2026-0098", # rustls-webpki 0.101; via tonic/tikv-client/opendal
    "RUSTSEC-2026-0099", # rustls-webpki 0.101; via tonic/tikv-client/opendal
    "RUSTSEC-2026-0104", # rustls-webpki 0.101; via tonic/tikv-client/opendal
    "RUSTSEC-2026-0187", # lopdf stack-overflow on nested-PDF *parse*; via printpdf (report generation only, no PDF parsing); printpdf 0.9 pins lopdf ^0.39 so cannot bump independently
    "RUSTSEC-2026-0194", # quick-xml 0.39 quadratic-attr DoS; via plist (pins ^0.39) via browser-forensic-safari; needs quick-xml >=0.41 (plist release)
    "RUSTSEC-2026-0195", # quick-xml 0.39 namespace-alloc DoS; via plist (pins ^0.39) via browser-forensic-safari; needs quick-xml >=0.41 (plist release)
]

[package]
name = "issen-cli"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0"
description = "Command-line interface for Issen"
repository.workspace = true

[[bin]]
name = "issen"
path = "src/main.rs"

[lib]
name = "issen_cli"
path = "src/lib.rs"

[dependencies]
ctrlc = { workspace = true }
indicatif = { workspace = true }
forensic-pivot = { workspace = true }
issen-core = { workspace = true }
# Aggregator umbrellas own the parser/provider link-anchor set (build.rs codegen
# from their own manifests). The two root anchors in lib.rs reference these.
issen-parsers = { workspace = true }
issen-providers = { workspace = true }
issen-fswalker = { workspace = true }
issen-timeline = { workspace = true }
issen-signatures = { workspace = true }
forensicnomicon = { workspace = true }
ntfs-core = { workspace = true }
mft = { workspace = true }
chrono = { workspace = true }
inventory = { workspace = true }
issen-report = { workspace = true }
issen-remote-access = { workspace = true }
# Parsers/providers whose ONLY role is force-linking now live in the two
# aggregator umbrellas (issen-parsers / issen-providers), which carry the anchors
# generated from their own manifests. issen-cli keeps a direct dep only for the
# crates it references in source beyond the anchor:
#   - issen-parser-srum / issen-parser-uac: used directly in commands/scanning.
#   - issen-parser-biome: linked via a direct `commands::biome::run` reference
#     (never an anchor), so it stays a direct dep.
issen-parser-srum = { workspace = true }
issen-parser-uac = { workspace = true }
issen-parser-biome = { workspace = true }
issen-correlation = { workspace = true, features = ["remote"] }
issen-unpack = { workspace = true }
issen-mem    = { workspace = true }
issen-evtx   = { workspace = true }
winevt-core = { workspace = true }
issen-remote-io = { workspace = true, features = ["remote"] }
srum-parser  = { workspace = true }
srum-core    = { workspace = true }
clap = { workspace = true }
colored = { workspace = true }
is-terminal = { workspace = true }
# Direct pin (not workspace-inherited): the root Cargo.toml carries an
# uncommitted local [patch.crates-io] for tier-2 testing, so this single
# consumer pins the version here rather than adding a workspace.dependencies
# entry. No-op returning Ok on Unix (colors stay on); enables VT on Windows.
enable-ansi-support = "0.3"
anyhow = { workspace = true }
duckdb = { workspace = true }
serde_json = { workspace = true }
csv = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[target.'cfg(unix)'.dependencies]
issen-remote-io = { workspace = true, features = ["sftp"] }

[dev-dependencies]
assert_cmd = { workspace = true }
flate2 = { workspace = true }
issen-disk = { workspace = true }
predicates = { workspace = true }
sha2 = { workspace = true }
tar = { workspace = true }
tempfile = { workspace = true }
# link_completeness drift gate parses the issen-parsers aggregator manifest.
toml = { workspace = true }
# Parser crates whose APIs are exercised directly by integration tests
# (parser_depth_gate / timestomp_real_szechuan). They link as anchors via the
# issen-parsers aggregator at runtime, but a test that calls their API needs a
# direct dev-dependency.
issen-parser-mft = { workspace = true }
issen-parser-lnk = { workspace = true }
issen-parser-prefetch = { workspace = true }
issen-parser-registry = { workspace = true }

[lints]
workspace = true

id: correlation.persistence.ld-preload
title: LD_PRELOAD rootkit persistence configured
severity: critical
description: LD_PRELOAD configured for system-wide library injection — all new processes will load the injected library.
summary_template: "LD_PRELOAD rootkit persistence established"
explanation_template: "A shared library has been registered in /etc/ld.so.preload. This is commonly used for userspace rootkit persistence — the library is loaded into every new process at startup and may enable process/network hiding without kernel-level access."
default_confidence: 95
assertion_level: observed
within_seconds: 900
references:
  - https://attack.mitre.org/techniques/T1574/006/
  - https://www.elastic.co/security-labs/elastic-security-labs-steps-through-the-r77-rootkit
clauses:
  - source: artifact
    required_tag: rootkit_indicator

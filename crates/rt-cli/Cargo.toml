[package]
name = "rt-cli"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0"
description = "Command-line interface for RapidTriage"
repository.workspace = true

[[bin]]
name = "rt"
path = "src/main.rs"

[lib]
name = "rt_cli"
path = "src/lib.rs"

[dependencies]
rt-core = { workspace = true }
rt-fswalker = { workspace = true }
rt-timeline = { workspace = true }
rt-signatures = { workspace = true }
usnjrnl-forensic = { workspace = true }
mft = { workspace = true }
chrono = { workspace = true }
inventory = { workspace = true }
rt-parser-evtx = { workspace = true }
rt-report = { workspace = true }
rt-remote-access = { workspace = true }
rt-parser-velociraptor = { workspace = true }
rt-parser-uac = { workspace = true }
rt-correlation = { workspace = true, features = ["remote"] }
rt-unpack = { workspace = true }
rt-mem = { workspace = true }
rt-evtx = { workspace = true }
rt-remote-io = { workspace = true, features = ["remote"] }
clap = { workspace = true }
anyhow = { workspace = true }
duckdb = { workspace = true }
serde_json = { workspace = true }
csv = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
flate2 = { workspace = true }
predicates = { workspace = true }
sha2 = { workspace = true }
tar = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true

[package]
name = "issen-vmdk"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0"
description = "VMware VMDK disk image reader for the Issen forensic pipeline"
repository.workspace = true

[lib]
name = "issen_vmdk"
path = "src/lib.rs"

[dependencies]
issen-core   = { workspace = true }
issen-unpack = { workspace = true }
issen-disk   = { workspace = true }
inventory    = { workspace = true }
vmdk         = { workspace = true }
thiserror    = { workspace = true }
tempfile     = { workspace = true }

[dev-dependencies]
vmdk = { workspace = true, features = ["test-helpers"] }
zip  = { workspace = true }

[lints]
workspace = true

[package]
name = "rt-remote-io"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = []
remote = ["dep:opendal", "dep:tokio"]

[dependencies]
anyhow = { workspace = true }
opendal = { version = "0.55.0", optional = true, features = [
    "services-s3",
    "services-gcs",
    "services-azblob",
    "services-webdav",
    "services-memory",
    "services-fs",
    "services-http",
    "blocking",
] }
tokio = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true

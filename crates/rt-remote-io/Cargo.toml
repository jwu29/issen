[package]
name = "rt-remote-io"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = []
remote = ["dep:opendal", "dep:tokio", "dep:reqwest"]

[dependencies]
anyhow      = { workspace = true }
serde       = { workspace = true, features = ["derive"] }
serde_json  = { workspace = true }
reqwest     = { workspace = true, optional = true }
opendal = { version = "0.55.0", optional = true, features = [
    # Cloud object storage
    "services-s3",
    "services-gcs",
    "services-azblob",
    "services-azdls",
    "services-azfile",
    "services-b2",
    "services-cos",
    "services-obs",
    "services-oss",
    "services-swift",
    "services-upyun",
    # Consumer / enterprise cloud drives
    "services-onedrive",
    "services-dropbox",
    "services-aliyun-drive",
    "services-yandex-disk",
    "services-pcloud",
    "services-koofr",
    "services-seafile",
    # Developer / ML / infra
    "services-github",
    "services-huggingface",
    "services-vercel-blob",
    "services-vercel-artifacts",
    "services-ghac",
    "services-dbfs",
    # Distributed / big data
    "services-alluxio",
    "services-webhdfs",
    "services-lakefs",
    # Decentralized
    "services-ipfs",
    "services-ipmfs",
    # In-memory / embedded
    "services-memory",
    # Network KV / databases
    "services-redis",
    "services-memcached",
    "services-etcd",
    "services-tikv",
    "services-mongodb",
    "services-gridfs",
    "services-mysql",
    "services-postgresql",
    "services-sqlite",
    # "services-surrealdb" — excluded: requires rustc 1.89 > MSRV 1.85
    "services-cloudflare-kv",
    "services-d1",
    # Filesystem / network protocols
    "services-fs",
    "services-http",
    "services-webdav",
    "services-sftp",
    "services-ftp",
    "services-hdfs-native",
    "services-compfs",
    # Do NOT add services-monoiofs (Linux io_uring only)
    "blocking",
] }
tokio = { workspace = true, optional = true }

[dev-dependencies]
tokio    = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile = { workspace = true }

[lints]
workspace = true
